<!-- JAVASCRIPT INSIDE HTML -->
<script>
    let baseFare = 50;
    let perKMrate = 15;
    let baseKM = 2;

    //Order of stations
    let stationValues = [
        0, 1.2, 1, 1.9, 1.5, 2.3, 0.8, 1, 0.8, 2, 0.95, 1.2, 2.05
    ];

function computeFare() {

    let PU = parseInt(document.getElementById("PU").value);
    let DO = parseInt(document.getElementById("DO").value);
    let discountType = document.getElementById("discount").value;

    //for someone who chooses one station
    if (isNaN(PU) || isNaN(DO)) {
        document.getElementById("result").innerHTML =
        "Please select both stations.";
        return;
    }

    //for when someone chooses to have the same pick up and drop of location
    if (PU === DO) {
        document.getElementById("result").innerHTML =
        "Pick-up and Drop-off cannot be the same.";
        return;
    }

    let totalDistance = 0;

    // Determine direction
    let start = Math.min(PU, DO);
    let end = Math.max(PU, DO);

    // Add all stations passed through
    for (let i = start; i < end; i++) {
        totalDistance += stationValues[i];
    }

    let totalFare = baseFare + (totalDistance * perKMrate);

    // Apply discount
    if (discountType === "discounted") {
        totalFare *= 0.80;
    }

    totalFare = Math.round(totalFare);

    document.getElementById("result").innerHTML =
    "<b>Stations Passed:</b> " + (end - start) +
    "<br><b>Total Distance:</b>" + totalDistance.toFixed(2) + " km" +
    "<br><b>Total Fare:</b> ₱ " + totalFare;
}

</script>
